name: Release

# Triggers when you click "Publish release" on a GitHub Release.
# The release's tag (e.g. v0.2.0) becomes the app version, and built
# artifacts get attached to that same release.
#
# Also runnable manually from Actions → Release → Run workflow, useful
# for smoke-testing the build pipeline without cutting a real release.
# When run manually, pass the tag of an existing release to upload to;
# leave blank to build without uploading.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to upload artifacts to (optional — leave blank to just build)'
        required: false
        type: string

permissions:
  # Required so the workflow can upload built artifacts back to the release.
  contents: write

jobs:
  build-macos-arm64:
    name: Build macOS (arm64)
    # macos-latest is Apple Silicon on current GitHub runners. Intel/x64
    # builds are intentionally not produced.
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + tags so we can diff the current tag against the
          # previous one to generate a commit-based changelog.
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve tag
        id: tag
        # On `release: published` the tag comes from the event payload.
        # On `workflow_dispatch` it comes from the input (may be empty,
        # in which case we build without a version bump and skip upload).
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG:-<none>}"

      - name: Sync package.json version to tag
        if: steps.tag.outputs.tag != ''
        # If the tag is "v0.2.0", this sets package.json version to "0.2.0"
        # so the artifact filenames (pagr-0.2.0-arm64.dmg) match.
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          echo "Setting version to $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      # ─────────────────────────────────────────────────────────────
      # Optional: code signing + notarization.
      #
      # Without signing, users who download the .app will see a Gatekeeper
      # warning ("pagr can't be opened because Apple cannot check it for
      # malicious software"). They can right-click → Open to bypass, but
      # it's a rough first-run experience.
      #
      # To enable:
      #   1. Join the Apple Developer Program ($99/yr).
      #   2. Create a "Developer ID Application" certificate, export it as
      #      a .p12 file, base64-encode it, and save as GitHub secret
      #      MACOS_CERTIFICATE. Save the .p12 password as MACOS_CERTIFICATE_PWD.
      #   3. Generate an app-specific password at appleid.apple.com and save
      #      it as APPLE_APP_SPECIFIC_PASSWORD. Save your Apple ID email as
      #      APPLE_ID and your Team ID (from the developer portal) as
      #      APPLE_TEAM_ID.
      #   4. Uncomment the "Import signing certificate" step below.
      #   5. Uncomment the env block on the "Build" step below.
      #   6. Add osxSign + osxNotarize config to packagerConfig in forge.config.ts.
      # ─────────────────────────────────────────────────────────────
      #
      # - name: Import signing certificate
      #   env:
      #     MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      #     MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
      #   run: |
      #     echo "$MACOS_CERTIFICATE" | base64 --decode > cert.p12
      #     security create-keychain -p runner build.keychain
      #     security default-keychain -s build.keychain
      #     security unlock-keychain -p runner build.keychain
      #     security import cert.p12 -k build.keychain \
      #       -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
      #     security set-key-partition-list -S apple-tool:,apple: \
      #       -s -k runner build.keychain
      #     rm cert.p12

      - name: Build
        # env:
        #   APPLE_ID: ${{ secrets.APPLE_ID }}
        #   APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run make -- --arch=arm64

      - name: Generate release notes
        id: notes
        if: steps.tag.outputs.tag != ''
        # Builds a release-body.md file with: (1) install instructions for
        # unsigned builds, (2) commit-based changelog since the previous tag,
        # (3) a compare link to GitHub. The upload step appends this to
        # whatever body already exists on the release.
        run: |
          CURRENT_TAG="${{ steps.tag.outputs.tag }}"
          # The release event checks out the tagged commit, so HEAD == CURRENT_TAG.
          # Use HEAD instead of the tag name to avoid cases where the tag ref
          # isn't locally resolvable (e.g. when checkout fetches the tag's
          # commit without materializing the tag object).
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "Previous tag: ${PREV_TAG:-<none>}"

          # Install instructions — static content, heredoc quoted so nothing expands.
          cat > release-body.md <<'BODY_EOF'
          ## Install

          1. Download the `.dmg` below.
          2. Double-click to open and drag **pagr** into your Applications folder.
          3. The build is ad-hoc signed but not notarized by Apple, so on
             first launch macOS shows _"pagr cannot be opened because the
             developer cannot be verified"_. To bypass:

             - **Right-click** (or Control-click) **pagr** in Applications →
               **Open** → **Open** in the confirmation dialog.

             After the first launch, double-clicking works normally.

          If you instead see _"pagr is damaged and can't be opened"_ (rare,
          usually on locked-down managed Macs), run:

          ```sh
          xattr -cr /Applications/pagr.app
          ```

          ## Changelog

          BODY_EOF

          # Append commit list since previous tag (or last 50 commits if
          # this is the first tag on the repo).
          if [ -n "$PREV_TAG" ]; then
            git log "${PREV_TAG}..HEAD" \
              --pretty=format:"- %s (%h)" --no-merges >> release-body.md
            echo "" >> release-body.md
            echo "" >> release-body.md
            echo "[Full changelog](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG})" >> release-body.md
          else
            git log HEAD \
              --pretty=format:"- %s (%h)" --no-merges -n 50 >> release-body.md
            echo "" >> release-body.md
          fi

          echo "----- release-body.md -----"
          cat release-body.md

      - name: Upload artifacts to release
        # Only upload if we have a tag to attach to. On manual runs with
        # no tag input, the build artifacts stay in the workflow run only.
        if: steps.tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            out/make/**/*.dmg
          body_path: release-body.md
          # Append to whatever body the user wrote when creating the release,
          # rather than overwriting it.
          append_body: true

      - name: Upload artifacts as workflow artifact (manual runs without tag)
        if: steps.tag.outputs.tag == ''
        uses: actions/upload-artifact@v4
        with:
          name: pagr-arm64
          path: |
            out/make/**/*.dmg
